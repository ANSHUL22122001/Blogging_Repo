<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blogging Repo</title>
  <style>
    :root {
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #475569;
      --accent: #2563eb;
      --border: #dbeafe;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background: linear-gradient(135deg, #eff6ff 0%, #f8fafc 100%);
      color: var(--text);
      line-height: 1.6;
    }
    .wrap {
      max-width: 900px;
      margin: 40px auto;
      padding: 0 20px;
    }
    .hero {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 10px 25px rgba(15, 23, 42, 0.06);
    }
    h1 { margin: 0 0 8px; font-size: 2rem; }
    p { color: var(--muted); margin: 0 0 16px; }
    .grid {
      margin-top: 22px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
    }
    a.card {
      display: block;
      text-decoration: none;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px;
      color: inherit;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    a.card:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 22px rgba(37, 99, 235, 0.12);
    }
    .title { font-weight: 700; margin-bottom: 6px; }
    .meta { color: var(--accent); font-size: 0.92rem; }
    .pager {
      margin-top: 20px;
      display: flex;
      gap: 12px;
    }
    .btn {
      display: inline-block;
      padding: 10px 14px;
      border-radius: 10px;
      text-decoration: none;
      border: 1px solid var(--border);
      background: #ffffff;
      color: var(--accent);
      font-weight: 600;
    }
    .btn.disabled {
      color: #94a3b8;
      border-color: #e2e8f0;
      background: #f8fafc;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <h1>Blogging Repo</h1>
      <p>Local-first blog content hosted on GitHub Pages.</p>
      <div class="grid">
        <a class="card" href="LLM_Series/1st-page.html">
          <div class="title">The Agentic Way: Understanding Large Language Models</div>
          <div class="meta">LLM Series • Page 1</div>
        </a>
      </div>
      <div class="pager">
        <span class="btn disabled">← Previous</span>
        <a class="btn" href="LLM_Series/1st-page.html">Next →</a>
      </div>
    </section>
  </main>
</body>
</html>
