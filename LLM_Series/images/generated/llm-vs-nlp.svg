<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-label="LLM vs Traditional NLP comparison">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7fbff"/>
      <stop offset="100%" stop-color="#eef6ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#94a3b8" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1200" height="700" fill="url(#bg)"/>
  <text x="600" y="70" font-family="Segoe UI, Arial, sans-serif" font-size="42" text-anchor="middle" fill="#0f172a" font-weight="700">LLM vs Traditional NLP Models</text>
  <text x="600" y="108" font-family="Segoe UI, Arial, sans-serif" font-size="20" text-anchor="middle" fill="#334155">From task-specific pipelines to flexible language intelligence</text>

  <rect x="90" y="150" rx="20" ry="20" width="490" height="470" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" filter="url(#shadow)"/>
  <rect x="620" y="150" rx="20" ry="20" width="490" height="470" fill="#ffffff" stroke="#bfdbfe" stroke-width="2" filter="url(#shadow)"/>

  <text x="335" y="205" font-family="Segoe UI, Arial, sans-serif" font-size="30" text-anchor="middle" fill="#1e293b" font-weight="700">Traditional NLP</text>
  <text x="865" y="205" font-family="Segoe UI, Arial, sans-serif" font-size="30" text-anchor="middle" fill="#1d4ed8" font-weight="700">LLM</text>

  <circle cx="145" cy="255" r="6" fill="#475569"/>
  <text x="165" y="262" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#334155">One model per task</text>
  <circle cx="145" cy="315" r="6" fill="#475569"/>
  <text x="165" y="322" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#334155">Custom features + preprocessing</text>
  <circle cx="145" cy="375" r="6" fill="#475569"/>
  <text x="165" y="382" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#334155">Separate training pipelines</text>
  <circle cx="145" cy="435" r="6" fill="#475569"/>
  <text x="165" y="442" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#334155">High maintenance across tasks</text>
  <circle cx="145" cy="495" r="6" fill="#475569"/>
  <text x="165" y="502" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#334155">Limited transfer between problems</text>

  <circle cx="675" cy="255" r="6" fill="#2563eb"/>
  <text x="695" y="262" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#1e40af">Single base model, many tasks</text>
  <circle cx="675" cy="315" r="6" fill="#2563eb"/>
  <text x="695" y="322" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#1e40af">Prompt-driven behavior changes</text>
  <circle cx="675" cy="375" r="6" fill="#2563eb"/>
  <text x="695" y="382" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#1e40af">Strong zero/few-shot capability</text>
  <circle cx="675" cy="435" r="6" fill="#2563eb"/>
  <text x="695" y="442" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#1e40af">Reusable across product features</text>
  <circle cx="675" cy="495" r="6" fill="#2563eb"/>
  <text x="695" y="502" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#1e40af">Faster iteration for teams</text>

  <rect x="420" y="560" rx="14" ry="14" width="360" height="52" fill="#dbeafe" stroke="#93c5fd"/>
  <text x="600" y="594" font-family="Segoe UI, Arial, sans-serif" font-size="22" text-anchor="middle" fill="#1e3a8a" font-weight="600">Key shift: specialization -> generalization</text>
</svg>
