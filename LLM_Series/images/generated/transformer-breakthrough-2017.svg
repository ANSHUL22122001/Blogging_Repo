<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-label="Attention Is All You Need 2017 breakthrough diagram">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="100%" stop-color="#fffbeb"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#7c2d12" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1200" height="700" fill="url(#bg2)"/>
  <text x="600" y="70" font-family="Segoe UI, Arial, sans-serif" font-size="40" text-anchor="middle" fill="#7c2d12" font-weight="700">Why LLMs Became So Good</text>
  <text x="600" y="108" font-family="Segoe UI, Arial, sans-serif" font-size="22" text-anchor="middle" fill="#9a3412">Transformer Architecture and Attention (2017)</text>

  <line x1="120" y1="210" x2="1080" y2="210" stroke="#c2410c" stroke-width="6" stroke-linecap="round"/>
  <circle cx="340" cy="210" r="14" fill="#fb923c"/>
  <circle cx="620" cy="210" r="14" fill="#ea580c"/>
  <circle cx="900" cy="210" r="14" fill="#f97316"/>

  <text x="340" y="178" font-family="Segoe UI, Arial, sans-serif" font-size="20" text-anchor="middle" fill="#7c2d12">Before 2017</text>
  <text x="620" y="178" font-family="Segoe UI, Arial, sans-serif" font-size="20" text-anchor="middle" fill="#7c2d12" font-weight="700">2017</text>
  <text x="900" y="178" font-family="Segoe UI, Arial, sans-serif" font-size="20" text-anchor="middle" fill="#7c2d12">After 2017</text>

  <rect x="480" y="250" rx="18" ry="18" width="280" height="120" fill="#ffffff" stroke="#fdba74" stroke-width="2" filter="url(#soft)"/>
  <text x="620" y="298" font-family="Segoe UI, Arial, sans-serif" font-size="24" text-anchor="middle" fill="#9a3412" font-weight="700">Attention Is All You Need</text>
  <text x="620" y="330" font-family="Segoe UI, Arial, sans-serif" font-size="20" text-anchor="middle" fill="#b45309">Introduced Transformers</text>

  <rect x="130" y="420" rx="16" ry="16" width="300" height="180" fill="#fff" stroke="#fed7aa" stroke-width="2" filter="url(#soft)"/>
  <text x="280" y="462" font-family="Segoe UI, Arial, sans-serif" font-size="24" text-anchor="middle" fill="#9a3412" font-weight="700">Older Setup</text>
  <text x="160" y="500" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#7c2d12">- Mostly sequential processing</text>
  <text x="160" y="532" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#7c2d12">- Harder long-range context</text>
  <text x="160" y="564" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#7c2d12">- Slower scaling patterns</text>

  <rect x="460" y="420" rx="16" ry="16" width="300" height="180" fill="#fff" stroke="#fdba74" stroke-width="2" filter="url(#soft)"/>
  <text x="610" y="462" font-family="Segoe UI, Arial, sans-serif" font-size="24" text-anchor="middle" fill="#9a3412" font-weight="700">Transformer Core</text>
  <text x="490" y="500" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#7c2d12">- Attention focuses relevance</text>
  <text x="490" y="532" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#7c2d12">- Better context handling</text>
  <text x="490" y="564" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#7c2d12">- Strong language performance</text>

  <rect x="790" y="420" rx="16" ry="16" width="300" height="180" fill="#fff" stroke="#fed7aa" stroke-width="2" filter="url(#soft)"/>
  <text x="940" y="462" font-family="Segoe UI, Arial, sans-serif" font-size="24" text-anchor="middle" fill="#9a3412" font-weight="700">LLM Era</text>
  <text x="820" y="500" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#7c2d12">- Broad NLP capability</text>
  <text x="820" y="532" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#7c2d12">- Generative AI products</text>
  <text x="820" y="564" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#7c2d12">- Agentic workflows</text>
</svg>
