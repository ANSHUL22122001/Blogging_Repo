<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-label="Neural network overview diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#eef6ff"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#0f172a" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1200" height="700" fill="url(#bg)"/>

  <text x="600" y="70" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="40" fill="#0f172a" font-weight="700">Neural Network (Simple View)</text>
  <text x="600" y="105" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#334155">Input Layer → Hidden Layers → Output Layer</text>

  <rect x="120" y="150" width="960" height="460" rx="24" fill="#ffffff" stroke="#dbeafe" stroke-width="2" filter="url(#softShadow)"/>

  <text x="210" y="190" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#1e3a8a" font-weight="600">Input</text>
  <text x="450" y="190" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#1e3a8a" font-weight="600">Hidden 1</text>
  <text x="680" y="190" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#1e3a8a" font-weight="600">Hidden 2</text>
  <text x="930" y="190" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#1e3a8a" font-weight="600">Output</text>

  <g fill="#3b82f6" stroke="#1d4ed8" stroke-width="2">
    <circle cx="210" cy="250" r="16"/>
    <circle cx="210" cy="320" r="16"/>
    <circle cx="210" cy="390" r="16"/>
    <circle cx="210" cy="460" r="16"/>
    <circle cx="210" cy="530" r="16"/>
  </g>

  <g fill="#60a5fa" stroke="#1d4ed8" stroke-width="2">
    <circle cx="450" cy="240" r="16"/>
    <circle cx="450" cy="300" r="16"/>
    <circle cx="450" cy="360" r="16"/>
    <circle cx="450" cy="420" r="16"/>
    <circle cx="450" cy="480" r="16"/>
    <circle cx="450" cy="540" r="16"/>
  </g>

  <g fill="#93c5fd" stroke="#1d4ed8" stroke-width="2">
    <circle cx="680" cy="270" r="16"/>
    <circle cx="680" cy="340" r="16"/>
    <circle cx="680" cy="410" r="16"/>
    <circle cx="680" cy="480" r="16"/>
  </g>

  <g fill="#1d4ed8" stroke="#1e3a8a" stroke-width="2">
    <circle cx="930" cy="330" r="16"/>
    <circle cx="930" cy="430" r="16"/>
  </g>

  <g stroke="#93c5fd" stroke-width="2" opacity="0.9">
    <line x1="226" y1="250" x2="434" y2="240"/>
    <line x1="226" y1="250" x2="434" y2="300"/>
    <line x1="226" y1="320" x2="434" y2="300"/>
    <line x1="226" y1="320" x2="434" y2="360"/>
    <line x1="226" y1="390" x2="434" y2="360"/>
    <line x1="226" y1="390" x2="434" y2="420"/>
    <line x1="226" y1="460" x2="434" y2="420"/>
    <line x1="226" y1="460" x2="434" y2="480"/>
    <line x1="226" y1="530" x2="434" y2="480"/>
    <line x1="226" y1="530" x2="434" y2="540"/>

    <line x1="466" y1="240" x2="664" y2="270"/>
    <line x1="466" y1="300" x2="664" y2="270"/>
    <line x1="466" y1="300" x2="664" y2="340"/>
    <line x1="466" y1="360" x2="664" y2="340"/>
    <line x1="466" y1="360" x2="664" y2="410"/>
    <line x1="466" y1="420" x2="664" y2="410"/>
    <line x1="466" y1="420" x2="664" y2="480"/>
    <line x1="466" y1="480" x2="664" y2="480"/>
    <line x1="466" y1="540" x2="664" y2="480"/>

    <line x1="696" y1="270" x2="914" y2="330"/>
    <line x1="696" y1="340" x2="914" y2="330"/>
    <line x1="696" y1="340" x2="914" y2="430"/>
    <line x1="696" y1="410" x2="914" y2="430"/>
    <line x1="696" y1="480" x2="914" y2="430"/>
  </g>

  <text x="600" y="645" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#334155">Each connection carries learned weights; training updates these weights to reduce error.</text>
</svg>
